name: 📊 Обновить метрики связности

# Только ручной запуск через: gh workflow run update-metrics.yml
on:
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Клонировать репо
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Получить всю историю для корректного подсчёта

      - name: 🟢 Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📊 Запустить скрипт обновления метрик
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node fetch-metrics.js

      - name: 💾 Коммитить обновлённые метрики
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          if git diff --quiet metrics.json; then
            echo "✓ Метрики не изменились"
          else
            echo "📝 Коммитим обновлённые метрики..."
            git add metrics.json
            git commit -m "chore: обновить метрики связности системы [automated]"
            git push
          fi
